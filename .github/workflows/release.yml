name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            python-version: '3.12'
          - runner: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            python-version: '3.12'
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis --target x86_64-pc-windows-msvc
            python-version: '3.12'

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: src-tauri/resources/ocr-worker/requirements.txt

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        if: matrix.target == ''

      - name: Install Rust Stable With Target
        uses: dtolnay/rust-toolchain@stable
        if: matrix.target != ''
        with:
          targets: ${{ matrix.target }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Setup RapidOCR Worker Environment
        run: node ./scripts/setup-ocr-worker.mjs

      - name: Build RapidOCR Worker Binary
        run: node ./scripts/build-ocr-worker.mjs

      - name: Verify RapidOCR Worker Artifact
        shell: bash
        run: |
          ls -lah src-tauri/binaries
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            test -f src-tauri/binaries/rapidocr-worker.exe
          else
            test -f src-tauri/binaries/rapidocr-worker
          fi

      - name: Build With Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: 极易合同智能脱敏 ${{ github.ref_name }}
          releaseBody: |
            自动构建发布包。

            包含平台：
            - macOS
            - Windows
          releaseDraft: true
          prerelease: false
          includeDebug: false
          args: ${{ matrix.args }}
